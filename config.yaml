wake_up:
  engine: snowboy
  snowboy:
    snowboy_lib_path: ./snowboy
    resource_path: ./snowboy/resources/common.res
    model_path: ./snowboy/resources/models/snowboy.umdl
    sensitivity: 0.35
    audio_gain: 1
    apply_frontend: false
  porcupine:
    access_key: ${PICOVOICE_ACCESS_KEY}
    keyword_path: ./models/wakeword.ppn
    sensitivity: 0.5
asr:
  server_url: ws://localhost:10095
  ssl_enabled: false
  hotwords: ''
  mode: offline
  use_itn: true
agent:
  method: cli
  cli_path: openclaw
  session_id: voice-assistant
  thinking: medium
  timeout: 120
  local: false
  gateway_url: ws://127.0.0.1:18789
  system_prompt: 你是一个语音助手，用户通过语音与你交流，你的回复将被 TTS 语音合成后播放给用户。 请遵守以下规则： 1. 用纯文本回复，不要使用
    Markdown 格式（不要用 **加粗**、*斜体*、# 标题、- 列表等符号） 2. 回复简洁，适合语音朗读，不要过长 3. 不要使用 emoji 表情符号
    4. 用口语化的自然语言回复
tts:
  voice: zh-CN-XiaoxiaoNeural
  rate: +0%
  volume: +0%
  player: mpv
  player_args:
  - --no-terminal
  - --really-quiet
  proxy: http://127.0.0.1:7890
skills:
  enabled: true
  weather:
    enabled: true
    options:
      api_key: "${SENIVERSE_API_KEY}"
      location: 上海
    actions:
      query_weather:
        keywords:
        - 天气
        - 天气怎么样
        - 今天天气
        - 明天天气
        - 后天天气
        - 天气预报
        - 三天天气
  music:
    enabled: true
    options:
      volume_step: 10%
    actions:
      play:
        keywords:
        - 播放歌曲
        - 播放本地歌曲
        - 放首歌
        - 来首歌
        - 播放音乐
        - 播放
      play_favorite:
        keywords:
        - 播放收藏
        - 播放喜欢的歌
      next_track:
        keywords:
        - 下一首
        - 下一曲
        - 切歌
      prev_track:
        keywords:
        - 上一首
        - 上一曲
      stop:
        keywords:
        - 停止播放
        - 别播了
        - 安静
        - 停
        reply: 好的，已停止播放
      volume_up:
        keywords:
        - 大声一点
        - 音量调大
        - 声音大一点
        reply: 好的，已调大音量
      volume_down:
        keywords:
        - 小声一点
        - 音量调小
        - 声音小一点
        reply: 好的，已调小音量
  calendar:
    enabled: true
    actions:
      query_today:
        keywords:
        - 今天有什么安排
        - 今天日程
        - 今日安排
        - 今天有什么事
      query_tomorrow:
        keywords:
        - 明天有什么安排
        - 明天日程
        - 明天有什么事
      query_week:
        keywords:
        - 这周有什么安排
        - 本周日程
        - 这周有什么事
        - 这个星期日程
      query_next_week:
        keywords:
        - 下周有什么安排
        - 下周日程
        - 下周有什么事
        - 下个星期日程
      query_upcoming:
        keywords:
        - 未完成的日程
        - 还有什么日程
        - 待完成日程
        - 还有什么安排
  conversation:
    enabled: true
    actions:
      new_conversation:
        keywords:
        - 新对话
        - 重新开始
        - 开始新对话
        reply: 好的，已开启新对话
  utility:
    enabled: true
    options:
      city: 上海
    actions:
      current_time:
        keywords:
        - 现在几点
        - 几点了
        - 报时
        - 今天几号
        - 现在几点了
      reboot:
        keywords:
        - 重启系统
        - 重启树莓派
        - 重启设备
        reply: 确认要重启系统吗？请说确认重启来执行
      confirm_reboot:
        keywords:
        - 确认重启
        reply: 好的，系统即将重启
      system_status:
        keywords:
        - 系统状态
        - 系统信息
        - CPU使用率
        - 内存使用
        - 设备状态
      ip_address:
        keywords:
        - IP地址
        - 我的IP
        - 网络地址
        - IP是多少
      network_status:
        keywords:
        - 网络状态
        - 网络通不通
        - 网络检测
        - 网络连通
      morning_briefing:
        keywords:
        - 早上好
        - 早安
        - 上午好
  timer:
    enabled: true
    actions:
      set_timer:
        keywords:
        - 分钟后提醒
        - 分钟后叫我
        - 小时后提醒
        - 小时后叫我
        - 秒后提醒
        - 定个闹钟
        - 定个定时器
        - 倒计时
      query_timer:
        keywords:
        - 定时器状态
        - 还剩多少时间
        - 还有几分钟
      cancel_timer:
        keywords:
        - 取消定时器
        - 取消闹钟
        - 取消倒计时
audio:
  sample_rate: 16000
  channels: 1
  chunk_size: 512
  format: int16
  input_device_index: null
conversation:
  mode: single
  silence_timeout: 15
  max_rounds: 20
  prompt_sound: true
  sound_wake: ./static/beep_hi.wav
  sound_done: ./static/beep_lo.wav
  prompt_text: 我在
  vad_silence_timeout: 1.5
  vad_energy_threshold: 500
  continue_wait_timeout: 5
  max_history_rounds: 30
  barge_in: false
  streaming_tts: false
  do_not_disturb:
    enabled: true
    start: '21:30'
    end: 07:30
calendar:
  remind_enabled: true
  remind_check_interval: 60
  default_remind_minutes: 5
  wechat_remind:
    enabled: true
    target: o9cq80wES_EZ3kSkYZ08KgWfiM6M@im.wechat
web:
  enabled: true
  host: 0.0.0.0
  port: 8084
  tts_on_web: false
database:
  host: localhost
  port: 3306
  user: zlpi
  password: ${MYSQL_PASSWORD}
  database: ZLPI
  pool_size: 5
logging:
  level: INFO
  console: true
  console_color: true
  file: logs/assistant.log
  max_file_size: 10MB
  backup_count: 5
