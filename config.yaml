# =============================================================================
# WakeUpOpenClaw 配置文件
# =============================================================================

# 唤醒词配置 (Picovoice Porcupine)
wake_up:
  # Picovoice Access Key (免费注册获取: https://console.picovoice.ai/)
  access_key: "YOUR_PICOVOICE_ACCESS_KEY"
  # 自定义唤醒词模型路径 (.ppn 文件，需在 Picovoice Console 训练后下载 Linux ARM64 版本)
  keyword_path: "./models/wakeword.ppn"
  # 检测灵敏度 0.0 ~ 1.0，越高越灵敏但误触率也越高
  sensitivity: 0.5

# FunASR 语音识别配置
asr:
  # FunASR Docker 服务的 WebSocket 地址
  server_url: "ws://localhost:10095"
  # 热词（可选，用空格分隔，如 "小爪 OpenClaw 天气"）
  hotwords: ""
  # 识别模式: offline（离线）/ online（在线）/ 2pass（两遍，推荐）
  mode: "2pass"
  # 是否使用 ITN (逆文本归一化，如 "一百" -> "100")
  use_itn: true

# OpenClaw Agent 配置
agent:
  # 调用方式: cli（命令行）或 websocket（WebSocket API）
  method: "cli"
  # openclaw CLI 可执行文件路径
  cli_path: "openclaw"
  # 会话 ID，保持多轮对话上下文
  session_id: "voice-assistant"
  # 思考级别: off / minimal / low / medium / high / xhigh
  thinking: "medium"
  # 单次调用超时（秒）
  timeout: 60
  # WebSocket Gateway 地址（当 method 为 websocket 时使用）
  gateway_url: "ws://127.0.0.1:18789"

# TTS 语音合成配置 (edge-tts)
tts:
  # 语音名称（中文推荐: zh-CN-XiaoxiaoNeural / zh-CN-YunxiNeural / zh-CN-XiaoyiNeural）
  voice: "zh-CN-XiaoxiaoNeural"
  # 语速调整 (如 "+10%", "-20%", "+0%" 为默认)
  rate: "+0%"
  # 音量调整
  volume: "+0%"
  # 播放器命令 (mpv 推荐，也可用 aplay)
  player: "mpv"
  # 播放器参数
  player_args: ["--no-terminal", "--really-quiet"]

# 音频配置
audio:
  # 采样率 (Hz)，FunASR 和 Porcupine 都使用 16000
  sample_rate: 16000
  # 声道数
  channels: 1
  # 每次读取的帧数
  chunk_size: 512
  # 音频格式
  format: "int16"
  # 输入设备索引 (null 表示使用系统默认设备)
  input_device_index: null

# 多轮对话配置
conversation:
  # 静默超时（秒），无语音输入超过此时间则退出多轮对话
  silence_timeout: 15
  # 最大对话轮次
  max_rounds: 20
  # 是否播放唤醒提示音
  prompt_sound: true
  # 唤醒提示语（TTS 朗读）
  prompt_text: "我在"

# 日志配置
logging:
  # 全局日志级别: DEBUG / INFO / WARNING / ERROR / CRITICAL
  level: "INFO"
  # 是否输出到终端
  console: true
  # 终端是否使用彩色输出
  console_color: true
  # 日志文件路径（留空则不写文件）
  file: "logs/assistant.log"
  # 单个日志文件最大大小
  max_file_size: "10MB"
  # 保留的历史日志文件数量（自动轮转）
  backup_count: 5
