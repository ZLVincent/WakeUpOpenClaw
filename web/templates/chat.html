<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WakeUpOpenClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #16213e;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; color: #e94560; }
  nav { display: flex; gap: 12px; align-items: center; }
  nav a {
    color: #888;
    text-decoration: none;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  nav a:hover, nav a.active { color: #e94560; background: #1a1a2e; }
  .main-layout { display: flex; flex: 1; overflow: hidden; }

  /* 侧边栏 */
  .sidebar {
    width: 240px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #0f3460;
  }
  .sidebar-header span { font-size: 13px; color: #888; }
  .btn-new {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-new:hover { background: #c73e54; }
  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .conv-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 2px;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .conv-item:hover { background: #0f3460; }
  .conv-item.active { background: #0f3460; color: #e94560; }
  .conv-item .title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .conv-item .meta { font-size: 10px; color: #555; margin-left: 6px; white-space: nowrap; }
  .conv-item .badge-active {
    width: 6px; height: 6px; border-radius: 50%; background: #4caf50;
    display: inline-block; margin-left: 4px; flex-shrink: 0;
  }

  /* 聊天区 */
  .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user { align-self: flex-end; background: #0f3460; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #222; color: #ddd; border-bottom-left-radius: 4px; }
  .msg .msg-meta { font-size: 11px; color: #666; margin-top: 4px; }
  .msg .msg-source { font-size: 10px; color: #444; }
  #input-area {
    padding: 12px 16px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #0f3460;
    border-radius: 8px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
  }
  #msg-input:focus { border-color: #e94560; }
  #msg-input::placeholder { color: #555; }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  #send-btn { background: #e94560; color: #fff; }
  #send-btn:hover { background: #c73e54; }
  #send-btn:disabled { background: #555; cursor: not-allowed; }
  .typing { align-self: flex-start; color: #888; font-size: 13px; padding: 8px 14px; }
  .typing::after { content: ''; animation: dots 1.5s infinite; }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
  .empty-hint { text-align: center; color: #555; padding: 40px; font-size: 14px; }

  /* 状态指示器 */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }
  .status-dot.idle { background: #4caf50; }
  .status-dot.listening { background: #2196f3; animation: pulse 1s infinite; }
  .status-dot.thinking { background: #ff9800; animation: pulse 1.5s infinite; }
  .status-dot.speaking { background: #e94560; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* 移动端 */
  @media (max-width: 640px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>WakeUpOpenClaw</h1>
  <nav>
    <a href="/" class="active">聊天</a>
    <a href="/config">配置</a>
    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">连接中...</span>
    </div>
  </nav>
</header>

<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>对话列表</span>
      <button class="btn-new" onclick="newConversation()">+ 新对话</button>
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>

  <div class="chat-area">
    <div id="chat-box">
      <div class="empty-hint">选择一个对话或开始新对话</div>
    </div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="输入消息..." autocomplete="off">
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<script>
const chatBox = document.getElementById('chat-box');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
let activeConvId = null;

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function addMessage(role, text, meta, source) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  let html = escapeHtml(text);
  const parts = [];
  if (meta) parts.push(meta);
  if (source && source !== 'web') parts.push('<span class="msg-source">[' + source + ']</span>');
  if (parts.length) html += '<div class="msg-meta">' + parts.join(' ') + '</div>';
  div.innerHTML = html;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typing-indicator';
  div.textContent = 'AI 思考中';
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}
function removeTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  addMessage('user', text, new Date().toLocaleTimeString());
  msgInput.value = '';
  sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });
    const data = await res.json();
    removeTyping();
    if (data.error) { addMessage('assistant', '错误: ' + data.error); }
    else {
      addMessage('assistant', data.reply, data.duration + 's');
      if (data.conversation_id && data.conversation_id !== activeConvId) {
        activeConvId = data.conversation_id;
      }
    }
    loadConversations();
  } catch (err) { removeTyping(); addMessage('assistant', '请求失败: ' + err.message); }
  sendBtn.disabled = false;
  msgInput.focus();
}

async function loadConversations() {
  try {
    const res = await fetch('/api/conversations');
    const data = await res.json();
    const list = document.getElementById('conv-list');
    list.innerHTML = '';
    for (const c of data.conversations) {
      const div = document.createElement('div');
      div.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
      div.innerHTML =
        '<span class="title">' + escapeHtml(c.title || '新对话') + '</span>' +
        '<span class="meta">' + (c.round_count || 0) + '轮' +
        (c.is_active ? '<span class="badge-active"></span>' : '') + '</span>';
      div.onclick = () => loadConversation(c.id);
      list.appendChild(div);
    }
  } catch(e) {}
}

async function loadConversation(convId) {
  activeConvId = convId;
  chatBox.innerHTML = '';
  try {
    const res = await fetch('/api/conversations/' + convId + '/messages');
    const data = await res.json();
    if (!data.messages || data.messages.length === 0) {
      chatBox.innerHTML = '<div class="empty-hint">暂无消息</div>';
    } else {
      for (const m of data.messages) {
        const meta = m.duration_ms ? m.created_at + ' | ' + (m.duration_ms/1000).toFixed(1) + 's' : m.created_at;
        addMessage(m.role, m.content, meta, m.source);
      }
    }
    loadConversations();
  } catch(e) { chatBox.innerHTML = '<div class="empty-hint">加载失败</div>'; }
}

async function newConversation() {
  try {
    const res = await fetch('/api/conversations/new', {method: 'POST'});
    const data = await res.json();
    if (data.conversation) {
      activeConvId = data.conversation.id;
      chatBox.innerHTML = '<div class="empty-hint">新对话已创建，开始聊天吧</div>';
      loadConversations();
    }
  } catch(e) {}
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 初始化：加载对话列表，自动打开最新活跃对话
async function init() {
  await loadConversations();
  const res = await fetch('/api/conversations');
  const data = await res.json();
  if (data.conversations && data.conversations.length > 0) {
    const active = data.conversations.find(c => c.is_active);
    if (active) { await loadConversation(active.id); }
    else { await loadConversation(data.conversations[0].id); }
  }
}
init();
msgInput.focus();

// WebSocket 状态面板
const stateLabels = {
  idle: '待唤醒', listening: '录音中', thinking: 'AI 思考中', speaking: '语音播放中', shutdown: '已关闭',
};

function connectStatusWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(proto + '//' + location.host + '/ws/status');
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'status') {
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        dot.className = 'status-dot ' + data.state;
        txt.textContent = stateLabels[data.state] || data.state;
      }
    } catch(err) {}
  };
  ws.onclose = () => {
    document.getElementById('status-text').textContent = '已断开';
    document.getElementById('status-dot').className = 'status-dot';
    setTimeout(connectStatusWs, 3000);
  };
  ws.onerror = () => ws.close();
}
connectStatusWs();
</script>
</body>
</html>
