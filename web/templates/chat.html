<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WakeUpOpenClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #16213e;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #0f3460;
  }
  header h1 { font-size: 18px; color: #e94560; }
  header .status { font-size: 12px; color: #888; }
  nav { display: flex; gap: 12px; align-items: center; }
  nav a {
    color: #888;
    text-decoration: none;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  nav a:hover, nav a.active { color: #e94560; background: #1a1a2e; }
  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #0f3460;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #222;
    color: #ddd;
    border-bottom-left-radius: 4px;
  }
  .msg .meta {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }
  .msg.assistant .meta { color: #555; }
  #input-area {
    padding: 12px 16px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    display: flex;
    gap: 8px;
  }
  #msg-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #0f3460;
    border-radius: 8px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
  }
  #msg-input:focus { border-color: #e94560; }
  #msg-input::placeholder { color: #555; }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  #send-btn {
    background: #e94560;
    color: #fff;
  }
  #send-btn:hover { background: #c73e54; }
  #send-btn:disabled { background: #555; cursor: not-allowed; }
  #clear-btn {
    background: #333;
    color: #aaa;
    padding: 10px 12px;
  }
  #clear-btn:hover { background: #444; }
  .typing {
    align-self: flex-start;
    color: #888;
    font-size: 13px;
    padding: 8px 14px;
  }
  .typing::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
</style>
</head>
<body>

<header>
  <h1>WakeUpOpenClaw</h1>
  <nav>
    <a href="/" class="active">聊天</a>
    <a href="/config">配置</a>
    <span class="status" id="status">就绪</span>
  </nav>
</header>

<div id="chat-box"></div>

<div id="input-area">
  <input type="text" id="msg-input" placeholder="输入消息..." autocomplete="off">
  <button id="send-btn" onclick="sendMessage()">发送</button>
  <button id="clear-btn" onclick="clearHistory()" title="清空记录">&#x1f5d1;</button>
</div>

<script>
const chatBox = document.getElementById('chat-box');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(role, text, meta) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  let html = escapeHtml(text);
  if (meta) html += '<div class="meta">' + escapeHtml(meta) + '</div>';
  div.innerHTML = html;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.textContent = 'AI 思考中';
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  addMessage('user', text, new Date().toLocaleTimeString());
  msgInput.value = '';
  sendBtn.disabled = true;
  statusEl.textContent = '等待 AI 回复...';
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });
    const data = await res.json();
    removeTyping();

    if (data.error) {
      addMessage('assistant', '错误: ' + data.error);
    } else {
      addMessage('assistant', data.reply, data.duration + 's');
    }
  } catch (err) {
    removeTyping();
    addMessage('assistant', '请求失败: ' + err.message);
  }

  sendBtn.disabled = false;
  statusEl.textContent = '就绪';
  msgInput.focus();
}

async function clearHistory() {
  await fetch('/api/clear', {method: 'POST'});
  chatBox.innerHTML = '';
}

async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    const data = await res.json();
    for (const msg of data.history) {
      const meta = msg.duration ? msg.time + ' | ' + msg.duration + 's' : msg.time;
      addMessage(msg.role, msg.text, meta);
    }
  } catch (e) {}
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

loadHistory();
msgInput.focus();
</script>

</body>
</html>
