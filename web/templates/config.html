<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配置管理 - WakeUpOpenClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    background: #16213e;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #0f3460;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 18px; color: #e94560; }
  nav { display: flex; gap: 12px; align-items: center; }
  nav a {
    color: #888;
    text-decoration: none;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  nav a:hover, nav a.active { color: #e94560; background: #1a1a2e; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  .toast {
    position: fixed;
    top: 60px;
    right: 20px;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: #1b4332; color: #95d5b2; border: 1px solid #2d6a4f; }
  .toast.error { background: #3d0000; color: #f28b82; border: 1px solid #5a0000; }
  .section {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 12px 16px;
    background: #0f3460;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .section-header h2 { font-size: 15px; color: #e94560; }
  .section-header .toggle { color: #888; font-size: 12px; }
  .section-body { padding: 12px 16px; }
  .section-body.collapsed { display: none; }
  .field {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #1a1a2e;
  }
  .field:last-child { border-bottom: none; }
  .field-key {
    min-width: 200px;
    font-size: 13px;
    color: #82b1ff;
    padding-top: 6px;
    word-break: break-all;
  }
  .field-value { flex: 1; }
  .field-value input,
  .field-value select,
  .field-value textarea {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid #333;
    border-radius: 4px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 13px;
    font-family: monospace;
    outline: none;
  }
  .field-value input:focus,
  .field-value select:focus,
  .field-value textarea:focus { border-color: #e94560; }
  .field-value textarea { min-height: 60px; resize: vertical; }
  .field-value .type-hint { font-size: 11px; color: #555; margin-top: 2px; }
  .actions {
    position: sticky;
    bottom: 0;
    background: #16213e;
    border-top: 1px solid #0f3460;
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  button {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  .btn-save { background: #e94560; color: #fff; }
  .btn-save:hover { background: #c73e54; }
  .btn-save:disabled { background: #555; cursor: not-allowed; }
  .btn-reload { background: #0f3460; color: #ccc; }
  .btn-reload:hover { background: #1a4a8a; }
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 6px;
  }
  .badge-bool { background: #1b4332; color: #95d5b2; }
  .badge-num { background: #1a237e; color: #90caf9; }
  .badge-str { background: #4a1942; color: #ce93d8; }
  .badge-obj { background: #3e2723; color: #bcaaa4; }
  .loading { text-align: center; padding: 40px; color: #888; }

  /* Skill 卡片 */
  .skill-card {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    transition: opacity 0.2s;
  }
  .skill-card.disabled { opacity: 0.45; }
  .skill-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .skill-card-header .action-name {
    font-size: 13px;
    font-weight: bold;
    color: #82b1ff;
    flex: 1;
  }
  .skill-toggle {
    position: relative;
    width: 36px; height: 20px;
    background: #555;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .skill-toggle.on { background: #4caf50; }
  .skill-toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: left 0.2s;
  }
  .skill-toggle.on::after { left: 18px; }
  .skill-detail { font-size: 12px; color: #888; margin-top: 4px; }
  .skill-detail label { color: #666; margin-right: 4px; }
  .skill-keywords {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
  }
  .skill-kw-tag {
    background: #0f3460; color: #90caf9; font-size: 11px;
    padding: 2px 8px; border-radius: 10px;
  }
  .skill-option-row {
    display: flex; gap: 6px; align-items: center; margin-top: 4px;
  }
  .skill-option-row .opt-key { font-size: 11px; color: #82b1ff; min-width: 40px; }
  .skill-option-row input {
    padding: 3px 6px; border: 1px solid #333; border-radius: 3px;
    background: #16213e; color: #e0e0e0; font-size: 12px; width: 100px;
    outline: none;
  }
  .skill-option-row input:focus { border-color: #e94560; }
</style>
</head>
<body>

<header>
  <h1>WakeUpOpenClaw</h1>
  <nav>
    <a href="/">聊天</a>
    <a href="/config" class="active">配置</a>
    <a href="/logs">日志</a>
    <a href="/calendar">日程</a>
  </nav>
</header>

<div class="toast" id="toast"></div>

<!-- 系统管理区域 -->
<div class="container">
  <div class="section">
    <div class="section-header">
      <h2>系统管理</h2>
      <span class="toggle">[ - ]</span>
    </div>
    <div class="section-body" style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
      <span id="sys-version" style="font-size:12px;color:#888;flex:1;min-width:200px;">版本: 加载中...</span>
      <button class="btn-reload" onclick="checkUpdate()" id="check-btn">检查更新</button>
      <button class="btn-save" onclick="applyUpdate()" id="update-btn" style="display:none;">拉取更新并重启</button>
      <button class="btn-reload" onclick="restartService()">重启服务</button>
    </div>
    <div id="update-info" style="padding:0 16px 12px;font-size:12px;color:#888;display:none;"></div>
  </div>
</div>

<div class="container" id="config-container" style="padding-top: 0;">
  <div class="loading">加载配置中...</div>
</div>

<div class="actions">
  <button class="btn-reload" onclick="loadConfig()">重新加载</button>
  <button class="btn-save" id="save-btn" onclick="saveConfig()">保存配置</button>
</div>

<script>
let currentConfig = {};
const container = document.getElementById('config-container');

// 配置段的中文名称
const sectionNames = {
  wake_up: '唤醒词',
  asr: '语音识别 (FunASR)',
  agent: 'AI Agent (OpenClaw)',
  tts: '语音合成 (TTS)',
  audio: '音频',
  conversation: '对话',
  web: 'Web 服务',
  logging: '日志',
};

// 枚举字段定义: path -> [选项列表]
const enumFields = {
  'conversation.mode':    ['single', 'multi'],
  'wake_up.engine':       ['snowboy', 'porcupine'],
  'asr.mode':             ['offline', 'online', '2pass'],
  'agent.method':         ['cli', 'websocket'],
  'agent.thinking':       ['off', 'minimal', 'low', 'medium', 'high', 'xhigh'],
  'logging.level':        ['DEBUG', 'INFO', 'WARNING', 'ERROR', 'CRITICAL'],
  'audio.format':         ['int16'],
  'tts.voice':            ['zh-CN-XiaoxiaoNeural', 'zh-CN-YunxiNeural', 'zh-CN-XiaoyiNeural', 'zh-CN-YunyangNeural', 'zh-CN-XiaohanNeural'],
};

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function getType(val) {
  if (val === null || val === undefined) return 'null';
  if (typeof val === 'boolean') return 'bool';
  if (typeof val === 'number') return 'num';
  if (Array.isArray(val)) return 'array';
  if (typeof val === 'object') return 'obj';
  return 'str';
}

function renderField(key, value, path) {
  const type = getType(value);
  const div = document.createElement('div');
  div.className = 'field';

  const keyEl = document.createElement('div');
  keyEl.className = 'field-key';
  keyEl.textContent = key;
  const badge = document.createElement('span');
  badge.className = 'badge badge-' + (type === 'array' ? 'obj' : type);
  badge.textContent = type === 'null' ? 'null' : type;
  keyEl.appendChild(badge);
  div.appendChild(keyEl);

  const valEl = document.createElement('div');
  valEl.className = 'field-value';

  if (type === 'bool') {
    const sel = document.createElement('select');
    sel.dataset.path = path;
    sel.dataset.type = 'bool';
    sel.innerHTML = '<option value="true"' + (value ? ' selected' : '') + '>true</option>'
                  + '<option value="false"' + (!value ? ' selected' : '') + '>false</option>';
    valEl.appendChild(sel);
  } else if (type === 'num') {
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.step = 'any';
    inp.value = value;
    inp.dataset.path = path;
    inp.dataset.type = 'num';
    valEl.appendChild(inp);
  } else if (type === 'null') {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = '';
    inp.placeholder = 'null';
    inp.dataset.path = path;
    inp.dataset.type = 'null';
    valEl.appendChild(inp);
  } else if (type === 'obj' || type === 'array') {
    const ta = document.createElement('textarea');
    ta.value = JSON.stringify(value, null, 2);
    ta.dataset.path = path;
    ta.dataset.type = 'json';
    ta.rows = Math.min(Object.keys(value).length + 2, 10);
    valEl.appendChild(ta);
  } else if (path in enumFields) {
    // 枚举字段 -> 下拉框
    const sel = document.createElement('select');
    sel.dataset.path = path;
    sel.dataset.type = 'str';
    const options = enumFields[path];
    // 如果当前值不在选项列表中，加到最前面
    const allOpts = options.includes(String(value)) ? options : [String(value), ...options];
    for (const opt of allOpts) {
      const o = document.createElement('option');
      o.value = opt;
      o.textContent = opt;
      if (opt === String(value)) o.selected = true;
      sel.appendChild(o);
    }
    valEl.appendChild(sel);
  } else {
    // string - 长文本用 textarea
    const isLong = String(value).length > 80 || String(value).includes('\n');
    if (isLong) {
      const ta = document.createElement('textarea');
      ta.value = value;
      ta.dataset.path = path;
      ta.dataset.type = 'str';
      ta.rows = Math.max(3, String(value).split('\n').length + 1);
      valEl.appendChild(ta);
    } else {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.value = value;
      inp.dataset.path = path;
      inp.dataset.type = 'str';
      valEl.appendChild(inp);
    }
  }
  div.appendChild(valEl);
  return div;
}

function renderSection(sectionKey, sectionData) {
  const sec = document.createElement('div');
  sec.className = 'section';

  const header = document.createElement('div');
  header.className = 'section-header';
  const h2 = document.createElement('h2');
  h2.textContent = sectionNames[sectionKey] || sectionKey;
  const toggle = document.createElement('span');
  toggle.className = 'toggle';
  toggle.textContent = '[ - ]';
  header.appendChild(h2);
  header.appendChild(toggle);
  sec.appendChild(header);

  const body = document.createElement('div');
  body.className = 'section-body';

  if (typeof sectionData === 'object' && sectionData !== null && !Array.isArray(sectionData)) {
    // skills 段特殊渲染为分组卡片
    if (sectionKey === 'skills') {
      for (const [k, v] of Object.entries(sectionData)) {
        if (k === 'enabled') {
          body.appendChild(renderField(k, v, 'skills.enabled'));
        } else if (typeof v === 'object' && v !== null) {
          body.appendChild(renderSkillGroupCard(k, v));
        }
      }
    } else {
    for (const [k, v] of Object.entries(sectionData)) {
      if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
        // 嵌套对象（如 wake_up.snowboy, wake_up.porcupine）
        const subHeader = document.createElement('div');
        subHeader.style.cssText = 'font-size:13px;color:#e94560;padding:8px 0 4px;border-top:1px solid #1a1a2e;margin-top:4px;';
        subHeader.textContent = k;
        body.appendChild(subHeader);
        for (const [sk, sv] of Object.entries(v)) {
          body.appendChild(renderField(sk, sv, sectionKey + '.' + k + '.' + sk));
        }
      } else {
        body.appendChild(renderField(k, v, sectionKey + '.' + k));
      }
    }
    } // close else for non-skills sections
  } else {
    body.appendChild(renderField(sectionKey, sectionData, sectionKey));
  }

  sec.appendChild(body);

  header.addEventListener('click', () => {
    body.classList.toggle('collapsed');
    toggle.textContent = body.classList.contains('collapsed') ? '[ + ]' : '[ - ]';
  });

  return sec;
}

const skillDisplayNames = {
  music: '本地音乐播放', calendar: '日程管理',
  conversation: '对话管理', utility: '通用工具',
};

function renderSkillGroupCard(skillName, skillCfg) {
  const card = document.createElement('div');
  card.className = 'skill-card' + (skillCfg.enabled === false ? ' disabled' : '');
  card.dataset.skillName = skillName;

  // 头部：显示名 + toggle
  const hdr = document.createElement('div');
  hdr.className = 'skill-card-header';
  const name = document.createElement('span');
  name.className = 'action-name';
  name.textContent = (skillDisplayNames[skillName] || skillName) + ' (' + skillName + ')';
  hdr.appendChild(name);
  const tog = document.createElement('div');
  tog.className = 'skill-toggle' + (skillCfg.enabled !== false ? ' on' : '');
  tog.dataset.skillName = skillName;
  tog.onclick = function() { this.classList.toggle('on'); card.classList.toggle('disabled'); };
  hdr.appendChild(tog);
  card.appendChild(hdr);

  // options
  const opts = skillCfg.options || {};
  for (const [ok, ov] of Object.entries(opts)) {
    const row = document.createElement('div');
    row.className = 'skill-option-row';
    const keySpan = document.createElement('span');
    keySpan.className = 'opt-key';
    keySpan.textContent = ok + ':';
    row.appendChild(keySpan);
    const inp = document.createElement('input');
    inp.type = 'text'; inp.value = ov;
    inp.dataset.skillName = skillName;
    inp.dataset.optKey = ok;
    row.appendChild(inp);
    card.appendChild(row);
  }

  // actions
  const actions = skillCfg.actions || {};
  for (const [actionName, actionCfg] of Object.entries(actions)) {
    if (typeof actionCfg !== 'object') continue;
    const aDiv = document.createElement('div');
    aDiv.className = 'skill-detail';
    aDiv.style.borderTop = '1px solid #333';
    aDiv.style.paddingTop = '6px';
    aDiv.style.marginTop = '6px';

    // action 名
    const aLabel = document.createElement('label');
    aLabel.textContent = actionName;
    aLabel.style.color = '#82b1ff';
    aLabel.style.fontWeight = 'bold';
    aDiv.appendChild(aLabel);

    // 关键词标签编辑器
    const kwContainer = document.createElement('div');
    kwContainer.className = 'skill-keywords';
    kwContainer.style.marginTop = '4px';
    kwContainer.dataset.skillName = skillName;
    kwContainer.dataset.actionName = actionName;

    const kws = actionCfg.keywords || [];
    for (const kw of kws) {
      kwContainer.appendChild(createKeywordTag(kw, kwContainer));
    }

    // 添加关键词输入框
    const addInput = document.createElement('input');
    addInput.type = 'text';
    addInput.placeholder = '+ 添加';
    addInput.style.cssText = 'width:70px;padding:2px 6px;border:1px dashed #555;border-radius:10px;background:transparent;color:#ccc;font-size:11px;outline:none;';
    addInput.onkeydown = function(e) {
      if (e.key === 'Enter' && this.value.trim()) {
        e.preventDefault();
        kwContainer.insertBefore(createKeywordTag(this.value.trim(), kwContainer), this);
        this.value = '';
      }
    };
    kwContainer.appendChild(addInput);
    aDiv.appendChild(kwContainer);

    // reply
    if (actionCfg.reply) {
      const replyRow = document.createElement('div');
      replyRow.style.cssText = 'margin-top:4px;font-size:11px;color:#888;';
      const replyInput = document.createElement('input');
      replyInput.type = 'text'; replyInput.value = actionCfg.reply;
      replyInput.style.cssText = 'width:100%;padding:2px 6px;border:1px solid #333;border-radius:3px;background:#16213e;color:#e0e0e0;font-size:11px;outline:none;margin-top:2px;';
      replyInput.dataset.skillName = skillName;
      replyInput.dataset.actionName = actionName;
      replyInput.dataset.field = 'reply';
      const rl = document.createElement('label');
      rl.textContent = '回复: ';
      rl.style.color = '#666';
      replyRow.appendChild(rl);
      replyRow.appendChild(replyInput);
      aDiv.appendChild(replyRow);
    }

    card.appendChild(aDiv);
  }

  return card;
}

function createKeywordTag(text, container) {
  const tag = document.createElement('span');
  tag.className = 'skill-kw-tag';
  tag.style.cursor = 'default';
  tag.innerHTML = escapeHtml(text) + ' <span style="cursor:pointer;margin-left:3px;color:#e94560;font-weight:bold;" onclick="this.parentElement.remove()">&times;</span>';
  return tag;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderConfig(config) {
  container.innerHTML = '';
  for (const [key, val] of Object.entries(config)) {
    container.appendChild(renderSection(key, val));
  }
}

function collectConfig() {
  const config = JSON.parse(JSON.stringify(currentConfig));
  document.querySelectorAll('[data-path]').forEach(el => {
    const path = el.dataset.path.split('.');
    const type = el.dataset.type;
    let val;
    if (type === 'bool') val = el.value === 'true';
    else if (type === 'num') val = el.value === '' ? null : Number(el.value);
    else if (type === 'null') val = el.value === '' ? null : el.value;
    else if (type === 'json') {
      try { val = JSON.parse(el.value); } catch(e) { val = el.value; }
    } else {
      val = el.value;
    }
    // 设置嵌套值
    let obj = config;
    for (let i = 0; i < path.length - 1; i++) {
      if (!(path[i] in obj)) obj[path[i]] = {};
      obj = obj[path[i]];
    }
    obj[path[path.length - 1]] = val;
  });

  // 收集 skill 分组卡片状态
  if (config.skills) {
    document.querySelectorAll('.skill-card[data-skill-name]').forEach(card => {
      const sn = card.dataset.skillName;
      if (!sn || !config.skills[sn]) return;

      // enabled toggle
      const tog = card.querySelector('.skill-toggle');
      if (tog) config.skills[sn].enabled = tog.classList.contains('on');

      // options
      card.querySelectorAll('.skill-option-row input[data-opt-key]').forEach(inp => {
        if (!config.skills[sn].options) config.skills[sn].options = {};
        config.skills[sn].options[inp.dataset.optKey] = inp.value;
      });

      // actions: 收集关键词和回复
      if (!config.skills[sn].actions) config.skills[sn].actions = {};
      card.querySelectorAll('.skill-keywords[data-action-name]').forEach(kwc => {
        const an = kwc.dataset.actionName;
        if (!config.skills[sn].actions[an]) config.skills[sn].actions[an] = {};
        // 收集关键词标签（排除输入框）
        const kws = [];
        kwc.querySelectorAll('.skill-kw-tag').forEach(tag => {
          // 提取纯文本（去掉删除按钮的 x）
          const text = tag.childNodes[0].textContent.trim();
          if (text) kws.push(text);
        });
        config.skills[sn].actions[an].keywords = kws;
      });

      // 收集 reply 输入
      card.querySelectorAll('input[data-field="reply"]').forEach(inp => {
        const an = inp.dataset.actionName;
        if (an && config.skills[sn].actions[an]) {
          config.skills[sn].actions[an].reply = inp.value;
        }
      });
    });
  }

  return config;
}

async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    currentConfig = data.config;
    renderConfig(currentConfig);
  } catch(e) {
    showToast('加载失败: ' + e.message, 'error');
  }
}

async function saveConfig() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const config = collectConfig();
    const res = await fetch('/api/config', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({config}),
    });
    const data = await res.json();
    if (data.error) {
      showToast(data.error, 'error');
    } else {
      showToast(data.message || '保存成功', 'success');
      currentConfig = config;
    }
  } catch(e) {
    showToast('保存失败: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '保存配置';
}

loadConfig();

// 系统管理
async function loadVersion() {
  try {
    const res = await fetch('/api/system/version');
    const data = await res.json();
    document.getElementById('sys-version').textContent =
      '版本: ' + data.version + ' (' + data.branch + ')';
  } catch(e) {}
}

async function checkUpdate() {
  const btn = document.getElementById('check-btn');
  btn.disabled = true; btn.textContent = '检查中...';
  try {
    const res = await fetch('/api/system/update/check');
    const data = await res.json();
    const info = document.getElementById('update-info');
    const updateBtn = document.getElementById('update-btn');
    if (data.has_update) {
      info.style.display = 'block';
      info.innerHTML = '<strong>发现 ' + data.commits.length + ' 个更新:</strong><br>' +
        data.commits.map(c => '&bull; ' + c).join('<br>');
      updateBtn.style.display = 'inline-block';
      showToast('发现 ' + data.commits.length + ' 个更新', 'success');
    } else {
      info.style.display = 'block';
      info.textContent = '已是最新版本';
      updateBtn.style.display = 'none';
      showToast('已是最新版本', 'success');
    }
  } catch(e) { showToast('检查失败: ' + e.message, 'error'); }
  btn.disabled = false; btn.textContent = '检查更新';
}

async function applyUpdate() {
  if (!confirm('确定要拉取更新并重启服务吗？')) return;
  const btn = document.getElementById('update-btn');
  btn.disabled = true; btn.textContent = '更新中...';
  try {
    const res = await fetch('/api/system/update/apply', {method: 'POST'});
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); btn.disabled = false; btn.textContent = '拉取更新并重启'; return; }
    showToast('更新已拉取，服务正在重启...', 'success');
    await waitForRestart();
  } catch(e) {
    showToast('请求失败，服务可能正在重启...', 'success');
    await waitForRestart();
  }
  btn.disabled = false; btn.textContent = '拉取更新并重启';
}

async function restartService() {
  if (!confirm('确定要重启服务吗？')) return;
  try {
    await fetch('/api/system/restart', {method: 'POST'});
    showToast('重启命令已发送，等待服务就绪...', 'success');
  } catch(e) {
    showToast('服务正在重启...', 'success');
  }
  await waitForRestart();
}

async function waitForRestart() {
  // 先等 2 秒让旧进程退出
  await new Promise(r => setTimeout(r, 2000));
  // 轮询直到新服务就绪（最多 30 秒）
  for (let i = 0; i < 15; i++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 2000);
      const res = await fetch('/api/system/version', {signal: controller.signal});
      clearTimeout(timeout);
      if (res.ok) {
        showToast('服务已就绪，正在刷新...', 'success');
        setTimeout(() => location.reload(), 500);
        return;
      }
    } catch(e) {
      // 服务还没起来，继续等
    }
    await new Promise(r => setTimeout(r, 2000));
  }
  showToast('服务可能未能启动，请手动检查', 'error');
}

loadVersion();
</script>
