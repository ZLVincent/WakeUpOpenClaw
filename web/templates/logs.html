<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日志 - WakeUpOpenClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #16213e;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; color: #e94560; }
  nav { display: flex; gap: 12px; align-items: center; }
  nav a {
    color: #888;
    text-decoration: none;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  nav a:hover, nav a.active { color: #e94560; background: #1a1a2e; }

  /* 工具栏 */
  .toolbar {
    background: #16213e;
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  .toolbar select, .toolbar input {
    padding: 5px 8px;
    border: 1px solid #333;
    border-radius: 4px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .toolbar select:focus, .toolbar input:focus { border-color: #e94560; }
  .toolbar label {
    font-size: 12px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .toolbar .search-box { flex: 1; min-width: 150px; }
  .toolbar button {
    padding: 5px 12px;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    background: #0f3460;
    color: #ccc;
    transition: background 0.2s;
  }
  .toolbar button:hover { background: #1a4a8a; }
  .toolbar .btn-refresh { background: #e94560; color: #fff; }
  .toolbar .btn-refresh:hover { background: #c73e54; }
  .toolbar .info { font-size: 11px; color: #555; margin-left: auto; }

  /* 日志容器 */
  .log-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    font-size: 12px;
    line-height: 1.7;
  }
  .log-line {
    white-space: pre-wrap;
    word-break: break-all;
    padding: 1px 0;
    border-bottom: 1px solid #111;
  }
  .log-line:hover { background: #16213e; }
  .log-line.hidden { display: none; }

  /* 日志级别颜色 */
  .log-line.level-debug { color: #4dd0e1; }
  .log-line.level-info { color: #81c784; }
  .log-line.level-warning { color: #ffd54f; }
  .log-line.level-error { color: #e57373; }
  .log-line.level-critical { color: #e57373; font-weight: bold; }

  /* 搜索高亮 */
  mark { background: #e94560; color: #fff; padding: 0 2px; border-radius: 2px; }

  .empty { text-align: center; color: #555; padding: 40px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>WakeUpOpenClaw</h1>
  <nav>
    <a href="/">聊天</a>
    <a href="/config">配置</a>
    <a href="/logs" class="active">日志</a>
  </nav>
</header>

<div class="toolbar">
  <select id="file-select" onchange="loadLogs()" title="日志文件">
    <option value="assistant.log">assistant.log</option>
  </select>
  <select id="level-filter" onchange="applyFilters()" title="级别过滤">
    <option value="">全部级别</option>
    <option value="DEBUG">DEBUG</option>
    <option value="INFO">INFO</option>
    <option value="WARNING">WARNING</option>
    <option value="ERROR">ERROR</option>
    <option value="CRITICAL">CRITICAL</option>
  </select>
  <select id="module-filter" onchange="applyFilters()" title="模块过滤">
    <option value="">全部模块</option>
    <option value="main">main</option>
    <option value="wake_up">wake_up</option>
    <option value="asr">asr</option>
    <option value="agent">agent</option>
    <option value="tts">tts</option>
    <option value="audio">audio</option>
    <option value="web">web</option>
    <option value="storage">storage</option>
    <option value="skills">skills</option>
    <option value="config">config</option>
  </select>
  <input type="text" id="search-input" class="search-box"
         placeholder="搜索关键词..." oninput="applyFilters()">
  <label>
    <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()">
    自动刷新
  </label>
  <button class="btn-refresh" onclick="loadLogs()">刷新</button>
  <button onclick="scrollToBottom()">↓ 底部</button>
  <span class="info" id="log-info">加载中...</span>
</div>

<div class="log-container" id="log-container">
  <div class="empty">加载中...</div>
</div>

<script>
const logContainer = document.getElementById('log-container');
const fileSelect = document.getElementById('file-select');
const levelFilter = document.getElementById('level-filter');
const moduleFilter = document.getElementById('module-filter');
const searchInput = document.getElementById('search-input');
const logInfo = document.getElementById('log-info');
let autoRefreshTimer = null;
let allLines = [];
let userScrolled = false;

// 检测用户是否手动上滚了
logContainer.addEventListener('scroll', () => {
  const atBottom = logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < 50;
  userScrolled = !atBottom;
});

function getLogLevel(line) {
  if (line.includes('[DEBUG')) return 'debug';
  if (line.includes('[INFO')) return 'info';
  if (line.includes('[WARNING')) return 'warning';
  if (line.includes('[ERROR')) return 'error';
  if (line.includes('[CRITICAL')) return 'critical';
  return '';
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightSearch(text, keyword) {
  if (!keyword) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const regex = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function renderLogs() {
  const level = levelFilter.value.toLowerCase();
  const module = moduleFilter.value.toLowerCase();
  const keyword = searchInput.value.trim();

  let html = '';
  let visibleCount = 0;

  for (const line of allLines) {
    const lineLevel = getLogLevel(line);
    const lineLower = line.toLowerCase();

    // 级别过滤
    if (level && lineLevel !== level) continue;
    // 模块过滤
    if (module && !lineLower.includes('[' + module)) continue;
    // 关键词过滤
    if (keyword && !lineLower.includes(keyword.toLowerCase())) continue;

    visibleCount++;
    const levelClass = lineLevel ? ' level-' + lineLevel : '';
    const content = highlightSearch(line, keyword);
    html += '<div class="log-line' + levelClass + '">' + content + '</div>';
  }

  if (visibleCount === 0) {
    logContainer.innerHTML = '<div class="empty">无匹配日志</div>';
  } else {
    logContainer.innerHTML = html;
  }

  logInfo.textContent = visibleCount + ' / ' + allLines.length + ' 行';

  if (!userScrolled) {
    scrollToBottom();
  }
}

function applyFilters() {
  renderLogs();
}

async function loadLogs() {
  const file = fileSelect.value;
  try {
    const res = await fetch('/api/logs?lines=1000&file=' + encodeURIComponent(file));
    const data = await res.json();

    if (data.error) {
      logContainer.innerHTML = '<div class="empty">错误: ' + data.error + '</div>';
      return;
    }

    allLines = data.lines || [];

    // 更新文件选择器
    if (data.available_files && data.available_files.length > 0) {
      const currentVal = fileSelect.value;
      fileSelect.innerHTML = '';
      for (const f of data.available_files) {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = f;
        if (f === currentVal) opt.selected = true;
        fileSelect.appendChild(opt);
      }
    }

    renderLogs();
  } catch(e) {
    logContainer.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
  }
}

function scrollToBottom() {
  logContainer.scrollTop = logContainer.scrollHeight;
  userScrolled = false;
}

function toggleAutoRefresh() {
  const checked = document.getElementById('auto-refresh').checked;
  if (checked) {
    autoRefreshTimer = setInterval(loadLogs, 3000);
  } else {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
  }
}

// 初始加载
loadLogs();
</script>

</body>
</html>
